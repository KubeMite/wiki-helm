{{- if and .Values.networkPolicy.create .Values.networkPolicy.defaultDeny }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wiki-helm.fullname" . }}-default-deny
  labels:
    {{- include "wiki-helm.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
{{- end }}
